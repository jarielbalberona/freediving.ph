services:
  database:
    container_name: database
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fph
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  fphgo:
    container_name: fphgo
    build:
      context: ./services/fphgo
      dockerfile: Dockerfile.dev
    depends_on:
      - database
    env_file:
      - ./services/fphgo/.env
    environment:
      DB_DSN: postgres://postgres:postgres@database:5432/fph?sslmode=disable
    ports:
      - "4000:4000"
    volumes:
      - ./services/fphgo:/app
volumes:
  pgdata:
