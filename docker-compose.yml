services:
  database:
    container_name: database
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: fphbuddies
      POSTGRES_PASSWORD: fphbuddiespw
      POSTGRES_DB: freedivingph
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
