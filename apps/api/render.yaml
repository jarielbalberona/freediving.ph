# Backend-specific Render configuration
# This file is for the Express.js API service only

services:
  - type: web
    name: freediving-ph-api
    env: node
    plan: starter
    region: oregon
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @freediving.ph/api build
    startCommand: pnpm --filter @freediving.ph/api start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: freediving-ph-db
          property: connectionString
      - key: SECRET
        generateValue: true
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_S3_FPH_BUCKET_NAME
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_SERVER_HOST
        sync: false
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_SERVER_PORT
        value: 587
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_SERVER_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_SERVER_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: CORS_ORIGIN
        value: https://freediving-ph-app.onrender.com
      - key: ORIGIN_URL
        value: https://freediving-ph-app.onrender.com
      - key: API_URL
        value: https://freediving-ph-api.onrender.com
      - key: APP_URL
        value: https://freediving-ph-app.onrender.com
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
