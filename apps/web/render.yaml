# Frontend-specific Render configuration
# This file is for the Next.js frontend service only

services:
  - type: web
    name: freediving-ph-app
    env: node
    plan: starter
    region: oregon
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @freediving.ph/web build
    startCommand: pnpm --filter @freediving.ph/web start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: NEXT_PUBLIC_FPHGO_BASE_URL
        value: https://freediving-ph-api.onrender.com
      - key: FPHGO_BASE_URL
        value: https://freediving-ph-api.onrender.com
      - key: NEXT_PUBLIC_APP_URL
        value: https://freediving-ph-app.onrender.com
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
        sync: false
