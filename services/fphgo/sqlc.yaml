version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "db/schema/*.sql"
    queries:
      - "internal/features/users/repo/queries/*.sql"
    gen:
      go:
        package: "usersqlc"
        out: "internal/features/users/repo/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_db_tags: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
